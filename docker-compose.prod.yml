services:
  app:
    # Use image from Docker Hub (built by CI/CD)
    image: ${DOCKER_USERNAME}/upgrade-backend:latest
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://upgrade:upgrade_pass@db:5432/upgrade_crm
      REDIS_URL: redis://redis:6379
      JWT_SECRET: "complex_secret_value_change_me_in_prod"
      POSTGRES_USER: upgrade
      POSTGRES_PASSWORD: upgrade_pass
      POSTGRES_DB: upgrade_crm
      # Allow frontend CORS if needed
      FRONTEND_URL: http://devupgrade.space4you.ru
      # Limit V8 heap to prevent exceeding 512M docker limit
      NODE_OPTIONS: "--max-old-space-size=384"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  frontend:
    # Use image from Docker Hub (built by CI/CD)
    image: ${DOCKER_USERNAME}/upgrade-frontend:latest
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - app
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 128M
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: upgrade
      POSTGRES_PASSWORD: upgrade_pass
      POSTGRES_DB: upgrade_crm
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U upgrade -d upgrade_crm' ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:alpine
    container_name: upgrade_redis_prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: always
    ports:
      - "9100:9100"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: always

volumes:
  pgdata:
  uploads_data:
  redis_data:
  prometheus_data:
  grafana_data: