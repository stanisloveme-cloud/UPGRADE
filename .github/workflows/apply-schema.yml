name: Apply Schema to DevStand

on:
  workflow_dispatch:

jobs:
  db-push:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and run Prisma db push
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Running prisma db push on upgrade-crm-app-1..."
            docker exec upgrade-crm-app-1 npx prisma db push --accept-data-loss
            echo "Restarting app container..."
            docker restart upgrade-crm-app-1
            echo "Schema applied successfully."
