name: fetch-logs
on:
  workflow_dispatch:
jobs:
  fetch-logs:
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker logs --tail 2000 upgrade-crm-app-1
