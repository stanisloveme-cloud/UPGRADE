name: fetch-logs
on:
  workflow_dispatch:
jobs:
  fetch-logs:
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec upgrade-crm-db-1 psql -U root -d upgrade_crm -c "\d sponsors"
            docker exec upgrade-crm-db-1 psql -U root -d upgrade_crm -c "\d user_events"
            docker exec upgrade-crm-db-1 psql -U root -d upgrade_crm -c "SELECT * FROM _prisma_migrations ORDER BY started_at DESC LIMIT 5"
