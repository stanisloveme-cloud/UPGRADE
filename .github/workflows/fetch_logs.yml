name: fetch-logs
on:
  workflow_dispatch:
jobs:
  fetch-logs:
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker exec upgrade-crm-app-1 npx prisma db pull --schema=/tmp/schema.prisma || true
            docker exec upgrade-crm-app-1 cat /tmp/schema.prisma
