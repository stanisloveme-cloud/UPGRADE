name: fetch-logs
on:
  workflow_dispatch:
jobs:
  fetch-logs:
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker logs --tail 250 upgrade-crm-app-1 || docker logs --tail 250 upgrade-crm_app_1
            echo "--- DB MIGRATIONS ---"
            docker exec upgrade-crm-db-1 psql -U upgrade -d upgrade_crm -c "SELECT * FROM _prisma_migrations ORDER BY started_at DESC LIMIT 5"
