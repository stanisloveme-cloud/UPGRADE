name: Deploy Application

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/upgrade-backend:latest
          # Optimization: Cache layers (Disabled to fix driver error)
          # cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/upgrade-backend:buildcache
          # cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/upgrade-backend:buildcache,mode=max

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: client/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:latest
          # no-cache removed for optimization
          # cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:buildcache
          # cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:buildcache,mode=max

      - name: Read Configuration
        id: read_config
        run: |
          {
            echo 'COMPOSE_CONFIG<<EOF'
            cat docker-compose.prod.yml
            echo ""
            echo 'EOF'
            echo 'PROMETHEUS_CONFIG<<EOF'
            cat prometheus.yml
            echo ""
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMPOSE_CONFIG: ${{ env.COMPOSE_CONFIG }}
          PROMETHEUS_CONFIG: ${{ env.PROMETHEUS_CONFIG }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: COMPOSE_CONFIG,PROMETHEUS_CONFIG
          script: |
            # Stop on first error
            set -e

            # Export variables for docker-compose
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            # Login to Docker Hub to avoid rate limits
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull the latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/upgrade-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:latest
            
            # Create project directory
            mkdir -p ~/upgrade-crm
            cd ~/upgrade-crm

            # Remove directory prometheus.yml if it was created by docker daemon by mistake
            if [ -d "prometheus.yml" ]; then
                rm -rf prometheus.yml
            fi

            # Write config file directly (Single Source of Truth)
            echo "$COMPOSE_CONFIG" > docker-compose.prod.yml
            echo "$PROMETHEUS_CONFIG" > prometheus.yml

            # DEBUG: Verify config file content
            echo "=== DOCKER COMPOSE CONFIG ==="
            cat docker-compose.prod.yml

            # Restart services using new images
            # Prioritize 'docker compose' (v2)
            if docker compose version &> /dev/null; then
                DC_CMD="docker compose"
            elif command -v docker-compose &> /dev/null; then
                DC_CMD="docker-compose"
            else
                echo "Error: Docker Compose not found"
                exit 1
            fi
            $DC_CMD -f docker-compose.prod.yml down || true
            docker ps -a --filter "name=upgrade-crm" -q | xargs -r docker rm -f || true

            # Install certbot if not present
            if ! command -v certbot &> /dev/null; then
                sudo apt-get update
                sudo apt-get install -y certbot
            fi

            # Check and run Certbot before bringing containers up
            if [ ! -d "/etc/letsencrypt/live/devupgrade.space4you.ru" ]; then
                echo "Certificates not found. Generating via certbot standalone..."
                sudo certbot certonly --standalone -d devupgrade.space4you.ru --non-interactive --agree-tos -m dev@space4you.ru
            fi

            # Setup cron for certbot renewal if not exists
            if ! sudo crontab -l | grep -q "certbot renew"; then
                (sudo crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --pre-hook \"cd ~/upgrade-crm && docker compose -f docker-compose.prod.yml stop frontend\" --post-hook \"cd ~/upgrade-crm && docker compose -f docker-compose.prod.yml start frontend\"") | sudo crontab -
            fi

            $DC_CMD -f docker-compose.prod.yml up -d --remove-orphans --force-recreate

            # NOTE: Migrations run automatically inside NestJS on startup (PrismaService.onModuleInit)
            # No need to docker compose exec separately — that was causing exit 137 (SIGKILL)

            # Prune unused images
            docker image prune -f

            # DEBUG: Show running containers and logs
            echo "=== RUNNING CONTAINERS ==="
            docker ps -a
            
            echo "=== NGINX CONFIG CHECKSUM ==="
            $DC_CMD -f docker-compose.prod.yml exec -T frontend cat /etc/nginx/conf.d/default.conf

            echo "=== FRONTEND LOGS ==="
            docker logs -n 20 upgrade-crm-frontend-1 || docker logs -n 20 upgrade-crm_frontend_1 || echo "Container name prediction failed"

            echo "=== BACKEND LOGS ==="
            docker logs -n 50 upgrade-crm-app-1 || docker logs -n 50 upgrade-crm_app_1 || echo "Container name prediction failed"