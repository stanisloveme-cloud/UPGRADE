name: Deploy to Dev-2 (Contract Testing)

on:
  push:
    branches: [ dev-2 ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev-2

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/upgrade-backend:dev2

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:dev2

      - name: Read Configuration
        id: read_config
        run: |
          {
            echo 'COMPOSE_CONFIG<<EOF'
            cat docker-compose.prod.yml
            echo ""
            echo 'EOF'
            echo 'PROMETHEUS_CONFIG<<EOF'
            cat prometheus.yml
            echo ""
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Deploy to Dev-2 Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMPOSE_CONFIG: ${{ env.COMPOSE_CONFIG }}
          PROMETHEUS_CONFIG: ${{ env.PROMETHEUS_CONFIG }}
          DOMAIN_NAME: "upgrade.space4you.ru"
        with:
          host: ${{ secrets.SERVER_HOST_DEV2 }}
          username: ${{ secrets.SERVER_USER_DEV2 }}
          key: ${{ secrets.SSH_PRIVATE_KEY_DEV2 }}
          envs: COMPOSE_CONFIG,PROMETHEUS_CONFIG,DOMAIN_NAME
          script: |
            set -e

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export DOMAIN_NAME=${{ env.DOMAIN_NAME }}
            export IMAGE_TAG=dev2

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKER_USERNAME }}/upgrade-backend:dev2
            docker pull ${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:dev2
            
            mkdir -p ~/upgrade-crm
            cd ~/upgrade-crm

            if [ -d "prometheus.yml" ]; then
                rm -rf prometheus.yml
            fi

            echo "$COMPOSE_CONFIG" > docker-compose.prod.yml
            echo "$PROMETHEUS_CONFIG" > prometheus.yml

            if docker compose version &> /dev/null; then
                DC_CMD="docker compose"
            elif command -v docker-compose &> /dev/null; then
                DC_CMD="docker-compose"
            else
                exit 1
            fi
            
            # Use dev2 images dynamically
            sed -i "s/upgrade-backend:latest/upgrade-backend:dev2/g" docker-compose.prod.yml
            sed -i "s/upgrade-frontend:latest/upgrade-frontend:dev2/g" docker-compose.prod.yml

            $DC_CMD -f docker-compose.prod.yml down || true
            docker ps -a --filter "name=upgrade-crm" -q | xargs -r docker rm -f || true
            docker rm -f upgrade_redis_prod prometheus grafana node_exporter cadvisor || true

            if ! command -v certbot &> /dev/null; then
                sudo apt-get update
                sudo apt-get install -y certbot
            fi

            if [ ! -d "/etc/letsencrypt/live/$DOMAIN_NAME" ]; then
                echo "Certificates not found. Generating via certbot standalone..."
                sudo certbot certonly --standalone -d $DOMAIN_NAME --non-interactive --agree-tos -m dev@space4you.ru
            fi

            if ! sudo crontab -l | grep -q "certbot renew.*dev2"; then
                (sudo crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --pre-hook \"cd ~/upgrade-crm && docker compose -f docker-compose.prod.yml stop frontend\" --post-hook \"cd ~/upgrade-crm && docker compose -f docker-compose.prod.yml start frontend\" #dev2") | sudo crontab -
            fi

            $DC_CMD -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
            docker image prune -f
