name: Fetch DevStand Logs

on:
  workflow_dispatch:

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Backend Logs via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- BACKEND LOGS ---"
            cd ~/upgrade-crm
            docker logs --tail 200 upgrade-crm-app-1
            echo "--- NGINX LOGS ---"
            docker logs --tail 50 upgrade-crm-frontend-1
