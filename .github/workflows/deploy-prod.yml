name: Deploy to Production

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/upgrade-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:latest

      - name: Read Configuration
        id: read_config
        run: |
          {
            echo 'COMPOSE_CONFIG<<EOF'
            cat docker-compose.prod.yml
            echo ""
            echo 'EOF'
            echo 'PROMETHEUS_CONFIG<<EOF'
            cat prometheus.yml
            echo ""
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Deploy to Prod Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          COMPOSE_CONFIG: ${{ env.COMPOSE_CONFIG }}
          PROMETHEUS_CONFIG: ${{ env.PROMETHEUS_CONFIG }}
          DOMAIN_NAME: ${{ secrets.PROD_DOMAIN }}
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          envs: COMPOSE_CONFIG,PROMETHEUS_CONFIG,DOMAIN_NAME
          script: |
            set -e

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export DOMAIN_NAME=${{ env.DOMAIN_NAME }}

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKER_USERNAME }}/upgrade-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/upgrade-frontend:latest
            
            # Using /root/upgrade-crm instead of ~/ to match infrastructure.md consistency
            mkdir -p /root/upgrade-crm
            cd /root/upgrade-crm

            if [ -d "prometheus.yml" ]; then
                rm -rf prometheus.yml
            fi

            echo "$COMPOSE_CONFIG" > docker-compose.prod.yml
            echo "$PROMETHEUS_CONFIG" > prometheus.yml

            if docker compose version &> /dev/null; then
                DC_CMD="docker compose"
            elif command -v docker-compose &> /dev/null; then
                DC_CMD="docker-compose"
            else
                exit 1
            fi
            
            $DC_CMD -f docker-compose.prod.yml down || true
            docker ps -a --filter "name=upgrade-crm" -q | xargs -r docker rm -f || true

            if ! command -v certbot &> /dev/null; then
                sudo apt-get update
                sudo apt-get install -y certbot
            fi

            if [ ! -d "/etc/letsencrypt/live/$DOMAIN_NAME" ]; then
                echo "Certificates not found. Generating via certbot standalone..."
                sudo certbot certonly --standalone -d $DOMAIN_NAME --non-interactive --agree-tos -m admin@upgrade-prod
            fi

            if ! sudo crontab -l | grep -q "certbot renew"; then
                (sudo crontab -l 2>/dev/null; echo "0 3 * * * certbot renew --pre-hook \"cd /root/upgrade-crm && docker compose -f docker-compose.prod.yml stop frontend\" --post-hook \"cd /root/upgrade-crm && docker compose -f docker-compose.prod.yml start frontend\"") | sudo crontab -
            fi

            $DC_CMD -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
            docker image prune -f

            $DC_CMD -f docker-compose.prod.yml exec -T frontend cat /etc/nginx/conf.d/default.conf