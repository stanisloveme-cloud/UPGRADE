<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone Sponsors Tilda Widget Test</title>
    <!-- Add Google Fonts to simulate Tilda -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .tilda-block {
            width: 100%;
            max-width: 1200px;
            background-color: transparent;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 0;
        }
        h2 {
            font-size: 32px;
            margin: 0;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="tilda-block">
        <div class="header">
            <h2>Наши Спонсоры и Партнеры</h2>
            <p style="color:#666; margin-top:10px;">(Тестовая среда)</p>
        </div>

        <!-- UPGRADE CRM Sponsors Widget -->
        <div id="crm-sponsors-root" data-event-id="1" data-layout="grid"></div>
        <script id="crm-sponsors-script" src="/tilda-sponsors.js"></script>

    </div>

    <script>
        // Update URL params dynamically for testing
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('eventId');
        const layout = urlParams.get('layout');

        const rootEl = document.getElementById('crm-sponsors-root');
        if (eventId) rootEl.setAttribute('data-event-id', eventId);
        if (layout) rootEl.setAttribute('data-layout', layout);
    </script>
</body>
</html>
