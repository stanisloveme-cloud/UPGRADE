<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tilda Integration Standalone</title>
    <!-- Имитация стилей обертки Tilda -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            margin: 0;
            padding: 40px;
        }
        .tilda-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 40px 0;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }
        .instructions {
            background-color: #f8f9fa;
            border-left: 4px solid #0d6efd;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .event-selector {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
            background: #f1f3f5;
            border-radius: 8px;

<body>

    <div class="tilda-container">
        <h1>Проверка интеграции (Test Tilda)</h1>
        
        <div class="instructions">
            <strong>Инструкция:</strong><br><br>
            В этом файле теперь отображается абсолютно тот же код, который должен уйти на Тильду в блок T123.<br>
            Скрипт читает нужный ID прямо со страницы.
        </div>

        <div class="event-selector">
            <label for="eventSelect" style="font-weight: bold; margin-right: 15px;">Выберите мероприятие для предпросмотра:</label>
            <select id="eventSelect" onchange="changeEventId(this.value)">
                <option value="76">ID 76: RTLigate 2025</option>
                <option value="1">ID 1: Upgrade Retail Весна 2025</option>
                <option value="2">ID 2: E-COM СФЕРА</option>
                <option value="42">ID 42: Тестовое событие</option>
            </select>
        </div>

        <!-- Tilda Snippet Start -->
        <script>
            // Выполняем подмену ID ДО того, как загрузится и сработает defer-скрипт Tilda
            const params = new URLSearchParams(window.location.search);
            const eventId = params.get('eventId') || 76;
            window.crmEventId = eventId;
            document.addEventListener('DOMContentLoaded', () => {
                const el = document.getElementById('eventSelect');
                if(el) el.value = eventId;
            });
            function changeEventId(newId) {
                window.location.search = '?eventId=' + newId;
            }
        </script>

        <!-- Tilda Snippet Start -->
        <!-- Tilda Integration Snippet (For T123 / HTML Block) -->
<!-- Контейнер для рендеринга расписания -->
<div id="crm-schedule-root" style="max-width: 1200px; margin: 0 auto; padding: 20px; font-family: Montserrat, sans-serif;">
  <div class="text-center py-5" id="crm-loading" style="text-align: center; color: #888;">Загрузка программы...</div>
</div>

<!-- Модальное окно для биографии спикера -->

    <span class="crm-modal-close" onclick="closeSpeakerModal()">&times;</span>
    <div id="crm-speaker-modal-body"></div>

</div>

<style>

  /* Flexbox Grid */

  #crm-schedule-root .crm-btn-primary {
    display: inline-block;

  /* Списки и вопросы */
  #crm-schedule-root .crm-questions {

  }
  #crm-schedule-root .crm-questions li {

  }

  /* Модальное окно */
  .crm-modal {
    position: fixed;
    z-index: 99999;
    left: 0;

</style>

<script>
  // Глобальная функция для модалки, чтобы работала из инлайн-onclick
  window.openSpeakerModal = function(speakerId) {
    const speaker = window.crmSpeakersData[speakerId];
    if (!speaker) return;
    
    let html = '';
    html += '<div style="display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px;">';
    if (speaker.photoUrl) {
        html += '<img src="' + speaker.photoUrl + '" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; filter: grayscale(100%);" />';
    }
    html += '<div>';
    html += '<h3 style="margin: 0 0 10px 0; font-size: 1.5rem; color: #212529;">' + speaker.firstName + ' ' + speaker.lastName + '</h3>';
    if (speaker.position || speaker.company) {
        html += '<div style="color: #6c757d; font-size: 1rem;">' + (speaker.position ? speaker.position : '') + (speaker.position && speaker.company ? ' / ' : '') + (speaker.company ? speaker.company : '') + '</div>';
    }
    html += '</div>';
    html += '</div>';
    
    if (speaker.bio) {
        // Конвертация переносов строк в <br> если text/plain
        const formattedBio = speaker.bio.replace(/\\n/g, '<br/>');
        html += '<div style="line-height: 1.6; color: #333;">' + formattedBio + '</div>';
    } else {
        html += '<div style="color: #888; font-style: italic;">Биография не заполнена.</div>';
    }
    
    document.getElementById('crm-speaker-modal-body').innerHTML = html;
    document.getElementById('crm-speaker-modal').style.display = 'block';
  };

  window.closeSpeakerModal = function() {
    document.getElementById('crm-speaker-modal').style.display = 'none';
  };

  window.onclick = function(event) {
    const modal = document.getElementById('crm-speaker-modal');
    if (event.target == modal) {
      modal.style.display = "none";
    }
  };

  (function() {
    // Конфигурация
    const EVENT_ID = window.crmEventId || 76; // Default to ID 76 if not specifically set
    const API_URL = 'https://devupgrade.space4you.ru/api/public/events/' + EVENT_ID + '/website-data';
    const root = document.getElementById('crm-schedule-root');
    
    // Хранилище
    let scheduleByDay = {}; // { '2025-05-15': [...] }
    let sortedDays = [];
    window.crmSpeakersData = {}; // Global for modal access

    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error('Network response was not ok');
        const data = await response.json();
        processData(data);
      } catch (error) {
        console.error('Error loading CRM schedule:', error);
        root.innerHTML = '<div style="text-align: center; color: red; padding: 20px;">Не удалось загрузить расписание.</div>';
      }
    }

    function processData(data) {
      const halls = data.halls || [];
      if (halls.length === 0) {
        root.innerHTML = '<div style="text-align: center; padding: 30px; font-size: 1.2rem;">Программа формируется...</div>';
        return;
      }

      // Плоский массив всех сессий с привязкой к дню и залу
      let allSessions = [];

      halls.forEach(hall => {
        (hall.tracks || []).forEach(track => {
            const dayKey = track.day ? track.day.split('T')[0] : 'unknown'; // "2025-10-21"
            (track.sessions || []).forEach(session => {
                session.dayKey = dayKey;
                session.hallName = hall.name;
                
                // Сохраняем спикеров глобально для модалки
                (session.speakers || []).forEach(sp => {
                    if (sp.speaker) window.crmSpeakersData[sp.speaker.id] = sp.speaker;
                });
                
                allSessions.push(session);
            });
        });
      });

      // Группировка
      allSessions.forEach(session => {
          if (!scheduleByDay[session.dayKey]) scheduleByDay[session.dayKey] = [];
          scheduleByDay[session.dayKey].push(session);
      });

      // Сортировка дней
      sortedDays = Object.keys(scheduleByDay).sort();
      
      // Сортировка сессий внутри дня
      sortedDays.forEach(day => {
          scheduleByDay[day].sort((a, b) => a.startTime.localeCompare(b.startTime));
      });

      // Рендер начального стейта
      if (sortedDays.length > 0) {
          renderLayout(sortedDays[0]);
      } else {
          root.innerHTML = '<div style="text-align: center; padding: 30px; font-size: 1.2rem;">Программа формируется...</div>';
      }
    }

    function formatDateForTab(dateStr) {
        if (dateStr === 'unknown') return 'Программа';
        const date = new Date(dateStr);
        return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
    }

    // Экспонируем для onClick табов
    window.crmChangeTab = function(dayKey) {
        renderLayout(dayKey);
    };

    function renderLayout(activeDay) {
        let html = '';
        
        // Рендер табов
        if (sortedDays.length > 1) {
            html += '<div class="crm-tabs">';
            sortedDays.forEach(day => {
                const isActive = day === activeDay ? 'active' : '';
                html += '<button class="crm-tab-btn ' + isActive + '" onclick="crmChangeTab(\'' + day + '\')">' + formatDateForTab(day) + '</button>';
            });
            html += '</div>';
        }

        // Рендер сессий
        const sessions = scheduleByDay[activeDay] || [];
        if (sessions.length === 0) {
            html += '<div style="text-align: center; padding: 30px; color: #888;">В этот день пока нет подтвержденных сессий.</div>';
        } else {
            sessions.forEach(session => {
                html += renderSession(session);
            });
        }
        
        // Кнопка регистрации в самом низу (может дублироваться или быть одной на блок)
        html += `
          <div style="text-align: center; margin-top: 50px; margin-bottom: 20px;">
            <a href="https://spring.upgrade.st/#registration" class="crm-btn-primary">Участвовать</a>
          </div>
        `;

        root.innerHTML = html;
    }

    function renderSession(session) {
        const timeRange = session.endTime ? session.startTime + ' — ' + session.endTime : session.startTime;
        const sponsors = session.sponsors || [];
        const questions = session.questions || [];
        
        const moderators = (session.speakers || []).filter(s => s.role === 'moderator' || s.isModerator).map(s => s.speaker).filter(Boolean);
        const speakers = (session.speakers || []).filter(s => s.role !== 'moderator' && !s.isModerator).map(s => s.speaker).filter(Boolean);

        let html = '<div class="crm-row crm-border-top pt-4 mb-4 pb-4">';
        
        // ---- Левая колонка: Время ----
        html += '<div class="crm-col crm-col-lg-2 crm-text-lg-end mb-3 time-col">';
        html += '<h5 style="margin: 0; font-family: Montserrat; font-size: 1.25rem;">' + timeRange + '</h5>';
        html += '<div class="small text-muted mt-2 fw-bold" style="text-transform: uppercase;">' + session.hallName + '</div>';
        html += '</div>';
        
        // ---- Центральная колонка: Название, Описание, Вопросы ----
        html += '<div class="crm-col crm-col-lg-6 mb-4">';
        html += '<h4 class="session-title mb-3" style="margin-top: 0; font-family: Montserrat;">' + session.title + '</h4>';
        
        if (session.description && session.description.trim() !== '') {
             html += '<div class="mb-3 text-muted small" style="line-height: 1.5;">' + session.description + '</div>';
        }
        
        // Тезисы / Вопросы
        if (questions.length > 0) {
            html += '<ul class="crm-questions">';
            questions.forEach(q => {
                html += '<li><strong>' + q.title + '</strong>';
                if (q.body) html += '<span class="text-muted small"> — ' + q.body + '</span>';
                html += '</li>';
            });
            html += '</ul>';
        }

        // Партнеры сессии (сделаем рендеринг, если данные будут заводиться в сессии)
        if (sponsors.length > 0) {
            html += '<div class="mt-4 pt-3" style="border-top: 1px solid #eee;">';
            html += '<div class="small text-muted mb-2">Партнеры сессии:</div>';
            html += '<div class="d-flex flex-wrap gap-3 align-items-center">';
            sponsors.forEach(sp => {
                if (sp.logoFileUrl) {
                    html += '<img src="' + sp.logoFileUrl + '" alt="' + sp.name + '" class="sponsor-logo" />';
                } else {
                    html += '<span style="padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px;">' + sp.name + '</span>';
                }
            });
            html += '</div></div>';
        }
        
        html += '</div>';

        // ---- Правая колонка: Спикеры и Модераторы ----
        html += '<div class="crm-col crm-col-lg-4">';
        
        function renderSpeakerBlock(person, labelElement) {
            let res = '<div class="d-flex align-items-start mb-3">';
            if (person.photoUrl) {
                res += '<img src="' + person.photoUrl + '" class="speaker-avatar me-3" />';
            }
            res += '<div class="lh-sm d-flex flex-column">';
            res += '<div class="fw-bold" style="color: #212529; font-size: 1.05rem;">' + person.firstName + ' ' + person.lastName + '</div>';
            
            const positionText = [person.position, person.company].filter(Boolean).join(', ');
            if (positionText) {
                res += '<div class="small text-muted mt-2" style="font-size: 0.8rem;">' + positionText + '</div>';
            }
            
            if (person.bio && person.bio.trim() !== '') {
                res += '<button class="crm-btn-link" onclick="openSpeakerModal(' + person.id + ')">Подробнее о спикере</button>';
            }
            res += '</div></div>';
            return res;
        }

        if (moderators.length > 0) {
            html += '<div class="fw-light fs-6 mb-3 text-muted" style="text-transform: uppercase; font-size: 0.85rem !important; font-weight: 500 !important; letter-spacing: 1px;">Модератор' + (moderators.length > 1 ? 'ы' : '') + '</div>';
            moderators.forEach(mod => { html += renderSpeakerBlock(mod); });
        }

        if (speakers.length > 0) {
            html += '<div class="fw-light fs-6 mb-3 mt-4 text-muted" style="text-transform: uppercase; font-size: 0.85rem !important; font-weight: 500 !important; letter-spacing: 1px;">Спикеры</div>';
            speakers.forEach(sp => { html += renderSpeakerBlock(sp); });
        }

        html += '</div>'; // End col-lg-4
        html += '</div>'; // End row
        
        return html;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fetchData);
    } else {
      fetchData();
    }
  })();
</script>

        <!-- Tilda Snippet End -->

    </div>
</body>
