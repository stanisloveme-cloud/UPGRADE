<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tilda Integration Standalone</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Имитация стилей обертки Tilda -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            margin: 0;
            padding: 40px;
        }
        .tilda-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 40px 0;
        }
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="tilda-container">
        <h1>Проверка интеграции (Test Tilda)</h1>

        <script>
            const params = new URLSearchParams(window.location.search);
            const eventId = params.get('eventId') || 1;
            const layoutMode = params.get('layout') || 'new';
        </script>

        <!-- Tilda Snippet Start -->
        <!-- Контейнер для рендеринга расписания -->
        <div id="crm-schedule-root" style="font-family: inherit;">
          <div class="text-center py-5" id="crm-loading" style="color: #888;">Загрузка программы...</div>
        </div>

        <script>
            const root = document.getElementById('crm-schedule-root');
            if (root) {
                root.setAttribute('data-event-id', eventId);
            }
        </script>

        <!-- Подключаем Bootstrap JS (требуется для модалок/колпапсов, если будут использоваться) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Подключаем нужный скрипт расписания v2 (старый) или new (новый) -->
        <script>
            const scriptTag = document.createElement('script');
            if (layoutMode === 'old') {
                scriptTag.src = "tilda-integration-v2.js?v=" + new Date().getTime();
            } else {
                scriptTag.src = "tilda-integration-new.js?v=" + new Date().getTime();
            }
            scriptTag.defer = true;
            document.body.appendChild(scriptTag);
        </script>
        <!-- Tilda Snippet End -->

    </div>
</body>
</html>
